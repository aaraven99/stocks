name: Weekly Model Training
on:
  workflow_dispatch:
  workflow_call:
jobs:
  training:
    runs-on: ubuntu-latest
    env:
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trading-ai-system/requirements.txt
      - run: pip install -r trading-ai-system/requirements.txt
      - name: Test, train, and validate
        working-directory: trading-ai-system
        run: |
          python -m unittest discover -s tests -v
          python src/pipeline/run_backfill.py --max-tickers 10 --period 2y --max-samples 20 --mc-sims 1000
          python src/pipeline/run_training.py
          python src/pipeline/run_backtest.py
          python src/pipeline/run_validation.py
          python src/pipeline/run_healthcheck.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-model-artifacts-${{ github.run_id }}
          path: |
            trading-ai-system/artifacts/
            trading-ai-system/research_logs/
            trading-ai-system/artifacts/champion_model.joblib
            trading-ai-system/artifacts/model_registry_snapshot.json
            trading-ai-system/artifacts/calibration_objects.json
