name: Manual System Test
on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: Run with deterministic synthetic test data and never submit broker orders
        required: true
        default: true
        type: boolean
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trading-ai-system/requirements.txt
      - run: pip install -r trading-ai-system/requirements.txt
      - name: Unit tests
        working-directory: trading-ai-system
        run: python -m unittest discover -s tests -v
      - name: End-to-end test pipeline
        working-directory: trading-ai-system
        run: python src/pipeline/run_daily.py --test-mode
      - name: Database healthcheck
        working-directory: trading-ai-system
        run: python src/pipeline/run_healthcheck.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manual-system-test-${{ github.run_id }}
          path: |
            trading-ai-system/artifacts/
            trading-ai-system/research_logs/
          retention-days: 14
