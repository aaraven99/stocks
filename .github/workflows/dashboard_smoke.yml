name: Dashboard Smoke Test
on: [push, workflow_dispatch]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trading-ai-system/requirements.txt
      - run: pip install -r trading-ai-system/requirements.txt
      - working-directory: trading-ai-system
        env:
          TEST_MODE: '1'
        run: |
          python -m compileall -q dashboard src
          python src/pipeline/run_daily.py --test-mode
          test -f artifacts/test_mode/trading_system_test.sqlite
          timeout 8 streamlit run dashboard/app.py --server.headless true --server.port 8501 || test $? -eq 124
