name: Daily Run
on:
  schedule:
    # GitHub cron is UTC. Run at both possible UTC offsets and gate to
    # exactly 07:00 America/Chicago so DST does not shift the briefing.
    - cron: '0 12,13 * * 1-5'
  workflow_dispatch:
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER_TRADE: 'true'
      ALPACA_DATA_FEED: iex
    steps:
      - name: Enforce 7 AM America/Chicago schedule
        id: schedule_gate
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_dow="$(TZ=America/Chicago date +%u)"
          local_zone="$(TZ=America/Chicago date +%Z)"
          expected_zone=""
          case "$GITHUB_EVENT_SCHEDULE" in
            "0 12 * * 1-5") expected_zone="CDT" ;;
            "0 13 * * 1-5") expected_zone="CST" ;;
          esac

          if [ "$local_dow" -le 5 ] && [ "$local_zone" = "$expected_zone" ]; then
            echo "Running the $local_zone 07:00 America/Chicago schedule."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping fallback schedule: $local_zone does not match $GITHUB_EVENT_SCHEDULE."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
      - uses: actions/checkout@v4
        if: steps.schedule_gate.outputs.run == 'true'
      - uses: actions/setup-python@v5
        if: steps.schedule_gate.outputs.run == 'true'
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trading-ai-system/requirements.txt
      - run: pip install -r trading-ai-system/requirements.txt
        if: steps.schedule_gate.outputs.run == 'true'
      - uses: actions/cache@v4
        if: steps.schedule_gate.outputs.run == 'true'
        with:
          path: trading-ai-system/.cache
          key: market-cache-${{ github.run_id }}
          restore-keys: market-cache-
      - name: Run research and paper execution
        if: steps.schedule_gate.outputs.run == 'true'
        working-directory: trading-ai-system
        run: python src/pipeline/run_daily.py
      - name: Send America/Chicago briefing
        if: steps.schedule_gate.outputs.run == 'true'
        working-directory: trading-ai-system
        env:
          EMAIL_ALLOW_OFF_SCHEDULE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          PYTHONPATH=src python - <<'PY'
          from pathlib import Path
          from core.time_utils import trading_date
          from reporting.email_sender import send

          result = send(
              Path('artifacts/daily_report.html').read_text(),
              'Systematic Swing Research ' + trading_date(),
          )
          print(result)
          if not result.get('sent'):
              raise SystemExit('Email was not sent: ' + result.get('reason', 'unknown reason'))
          PY
      - name: Healthcheck
        if: steps.schedule_gate.outputs.run == 'true'
        working-directory: trading-ai-system
        run: python src/pipeline/run_healthcheck.py
      - uses: actions/upload-artifact@v4
        if: always() && steps.schedule_gate.outputs.run == 'true'
        with:
          name: quant-research-${{ github.run_id }}
          path: |
            trading-ai-system/artifacts/
            trading-ai-system/research_logs/
            trading-ai-system/artifacts/trading_system.sqlite
            trading-ai-system/artifacts/daily_report.html
            trading-ai-system/artifacts/champion_model.joblib
          retention-days: 30
