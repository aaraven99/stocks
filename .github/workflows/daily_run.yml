name: Daily Run
on:
  schedule:
    # GitHub cron is UTC. Run at both possible UTC offsets and gate to
    # exactly 07:00 America/Chicago so DST does not shift the briefing.
    - cron: '0 12,13 * * 1-5'
  workflow_dispatch:
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER_TRADE: 'true'
      ALPACA_DATA_FEED: iex
    steps:
      - name: Enforce 7 AM America/Chicago schedule
        if: github.event_name == 'schedule'
        run: |
          local_hour="$(TZ=America/Chicago date +%H)"
          local_dow="$(TZ=America/Chicago date +%u)"
          if [ "$local_hour" != "07" ] || [ "$local_dow" -gt 5 ]; then
            echo "Skipping: local time is not 07:00 Monday-Friday America/Chicago."
            exit 78
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trading-ai-system/requirements.txt
      - run: pip install -r trading-ai-system/requirements.txt
      - uses: actions/cache@v4
        with:
          path: trading-ai-system/.cache
          key: market-cache-${{ github.run_id }}
          restore-keys: market-cache-
      - name: Run research and paper execution
        working-directory: trading-ai-system
        run: python src/pipeline/run_daily.py
      - name: Send America/Chicago briefing
        working-directory: trading-ai-system
        run: PYTHONPATH=src python -c "from reporting.email_sender import send; from pathlib import Path; from core.time_utils import trading_date; print(send(Path('artifacts/daily_report.html').read_text(),'Systematic Swing Research '+trading_date()))"
      - name: Healthcheck
        working-directory: trading-ai-system
        run: python src/pipeline/run_healthcheck.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quant-research-${{ github.run_id }}
          path: |
            trading-ai-system/artifacts/
            trading-ai-system/research_logs/
            trading-ai-system/artifacts/trading_system.sqlite
            trading-ai-system/artifacts/daily_report.html
            trading-ai-system/artifacts/champion_model.joblib
          retention-days: 30
