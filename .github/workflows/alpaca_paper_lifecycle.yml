name: Alpaca Paper Lifecycle
on:
  workflow_dispatch:
jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER_TRADE: 'true'
      RUN_ALPACA_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Verify Alpaca credentials
        shell: bash
        run: |
          if [ -z "$ALPACA_API_KEY" ] || [ -z "$ALPACA_SECRET_KEY" ]; then
            echo "ALPACA_API_KEY and ALPACA_SECRET_KEY must be configured in GitHub Actions secrets."
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r trading-ai-system/requirements.txt
      - name: Run paper account lifecycle test
        working-directory: trading-ai-system
        run: python -m unittest tests/test_alpaca_integration.py -v
