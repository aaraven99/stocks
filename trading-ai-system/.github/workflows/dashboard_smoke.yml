name: Dashboard Smoke Test
on: [push, workflow_dispatch]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: pip, cache-dependency-path: trading-ai-system/requirements.txt}
      - run: pip install -r trading-ai-system/requirements.txt
      - working-directory: trading-ai-system
        run: |
          python -m unittest discover -s tests -v
          python src/pipeline/run_daily.py --test-mode
          timeout 5 streamlit run dashboard/app.py --server.headless true || test $? -eq 124
